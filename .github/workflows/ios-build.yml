name: iOS Build (unsigned)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npx cap sync ios

      - name: Build unsigned archive
        run: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive

      - name: Package unsigned .ipa
        run: |
          mkdir -p ios/build/ipa/Payload
          cp -R ios/App/build/App.xcarchive/Products/Applications/App.app ios/build/ipa/Payload/
          cd ios/build/ipa && zip -r EZBassGrooves-unsigned.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: EZBassGrooves-unsigned-ipa
          path: ios/build/ipa/EZBassGrooves-unsigned.ipa
